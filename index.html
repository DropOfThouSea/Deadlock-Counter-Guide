<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadlock Counter Guide</title>
    <style>

        /* =====================
           RESET AND ROOT VARIABLES
        ===================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* Backgrounds */
            --bg:    #0f0f11;
            --bg2:   #18181c;
            --bg3:   #222228;

            /* Borders */
            --border:  rgba(255, 255, 255, 0.08);
            --border2: rgba(255, 255, 255, 0.14);

            /* Text */
            --text:  #e8e8f0;
            --text2: #9090a8;
            --text3: #55556a;

            /* Accent (purple) */
            --acc:    #7f77dd;
            --acc-bg: rgba(127, 119, 221, 0.15);

            /* Item category: Gun (yellow) */
            --gun:     #c8a227;
            --gun-bg:  rgba(200, 162, 39, 0.15);
            --gun-brd: rgba(200, 162, 39, 0.35);

            /* Item category: Vitality (green) */
            --vit:     #3fa86a;
            --vit-bg:  rgba(63, 168, 106, 0.15);
            --vit-brd: rgba(63, 168, 106, 0.35);

            /* Item category: Spirit (purple) */
            --spi:     #a07fd4;
            --spi-bg:  rgba(160, 127, 212, 0.15);
            --spi-brd: rgba(160, 127, 212, 0.35);
        }

        /* =====================
           BASE
        ===================== */
        body {
            background: var(--bg);
            font-family: system-ui, sans-serif;
            color: var(--text);
            padding: 12px;
        }

        /* =====================
           SEARCH BAR
        ===================== */
        .search-bar {
            position: relative;
            margin-bottom: 12px;
        }

        .search-bar input {
            width: 100%;
            padding: 9px 14px 9px 38px;
            border: 0.5px solid var(--border2);
            border-radius: 10px;
            background: var(--bg2);
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .search-bar input:focus {
            border-color: var(--acc);
        }

        .search-bar svg {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            width: 17px;
            height: 17px;
            stroke: var(--text3);
            fill: none;
        }

        /* =====================
           LEGEND
        ===================== */
        .legend {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .leg {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--text2);
        }

        .leg-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* =====================
           FILTER BUTTONS
        ===================== */
        .filters {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .fbtn {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            border: 0.5px solid var(--border2);
            background: var(--bg2);
            color: var(--text2);
            transition: all 0.15s;
        }

        .fbtn:hover {
            border-color: var(--acc);
            color: var(--text);
        }

        .fbtn.active {
            background: var(--acc-bg);
            color: #b8b2f0;
            border-color: var(--acc);
        }

        /* =====================
           HERO GRID
        ===================== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 9px;
            align-items: start;
        }

        /* =====================
           HERO CARD
        ===================== */
        .card {
            background: var(--bg2);
            border: 0.5px solid var(--border);
            border-radius: 11px;
            overflow: visible;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .card:hover {
            border-color: var(--border2);
        }

        .card.open {
            border-color: var(--acc);
        }

        /* Card header row */
        .ch {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            user-select: none;
        }

        /* Hero portrait */
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 7px;
            flex-shrink: 0;
            overflow: hidden;
            background: var(--bg3);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }

        /* Hero name and role */
        .hname {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        .hrole {
            font-size: 11px;
            color: var(--text2);
            margin-top: 1px;
        }

        /* Chevron arrow */
        .chev {
            margin-left: auto;
            font-size: 18px;
            color: var(--text3);
            transition: transform 0.2s;
            flex-shrink: 0;
            line-height: 1;
        }

        .card.open .chev {
            transform: rotate(180deg);
        }

        /* Card body (expandable) */
        .cbody {
            display: none;
            padding: 0 12px 12px;
            border-top: 0.5px solid var(--border);
        }

        .card.open .cbody {
            display: block;
        }

        /* Section label inside card */
        .slabel {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.07em;
            color: var(--text3);
            text-transform: uppercase;
            margin: 10px 0 5px;
        }

        /* =====================
           ITEM PILLS
        ===================== */
        .pills {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .pill {
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 11px;
            cursor: default;
            position: relative;
            line-height: 1.4;
        }

        /* Gun = yellow */
        .pill.gun {
            background: var(--gun-bg);
            color: #e8c35a;
            border: 0.5px solid var(--gun-brd);
        }

        /* Vitality = green */
        .pill.vit {
            background: var(--vit-bg);
            color: #5dcaa5;
            border: 0.5px solid var(--vit-brd);
        }

        /* Spirit = purple */
        .pill.spi {
            background: var(--spi-bg);
            color: #c4a0f0;
            border: 0.5px solid var(--spi-brd);
        }

        .pill:hover .tip {
            display: block;
        }

        /* =====================
           ITEM TOOLTIP
        ===================== */
        .tip {
            display: none;
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e26;
            border: 0.5px solid var(--border2);
            border-radius: 8px;
            padding: 8px 10px;
            width: 220px;
            z-index: 9999;
            pointer-events: none;
        }

        .tip-name {
            font-size: 12px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 4px;
        }

        .tip-body {
            font-size: 11px;
            color: var(--text2);
            line-height: 1.5;
        }

        .tip-cat {
            font-size: 10px;
            margin-top: 4px;
            padding: 2px 6px;
            border-radius: 10px;
            display: inline-block;
        }

        .tip-cat.gun { background: var(--gun-bg); color: #e8c35a; }
        .tip-cat.vit { background: var(--vit-bg); color: #5dcaa5; }
        .tip-cat.spi { background: var(--spi-bg); color: #c4a0f0; }

        /* =====================
           COUNTER TIPS LIST
        ===================== */
        .tips-list {
            list-style: none;
        }

        .tips-list li {
            font-size: 12px;
            color: var(--text2);
            padding: 4px 0;
            border-bottom: 0.5px solid var(--border);
            line-height: 1.5;
            display: flex;
            gap: 7px;
            align-items: flex-start;
        }

        .tips-list li:last-child {
            border-bottom: none;
        }

        .tips-list li::before {
            content: "\2192";
            color: var(--acc);
            flex-shrink: 0;
            font-size: 11px;
            margin-top: 2px;
        }

        /* =====================
           NO RESULTS
        ===================== */
        .no-r {
            text-align: center;
            padding: 3rem;
            color: var(--text3);
            font-size: 13px;
        }

    </style>
</head>
<body>

    <!-- Search Bar -->
    <div class="search-bar">
        <svg viewBox="0 0 24 24" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="srch" placeholder="Search hero..." oninput="render()"/>
    </div>

    <!-- Item Category Legend -->
    <div class="legend">
        <div class="leg">
            <div class="leg-dot" style="background: #c8a227"></div>
            Gun
        </div>
        <div class="leg">
            <div class="leg-dot" style="background: #3fa86a"></div>
            Vitality
        </div>
        <div class="leg">
            <div class="leg-dot" style="background: #a07fd4"></div>
            Spirit
        </div>
    </div>

    <!-- Filter Buttons -->
    <div class="filters" id="filters"></div>

    <!-- Hero Cards Grid -->
    <div class="grid" id="grid"></div>

    <!-- No Results Message -->
    <div class="no-r" id="nor" style="display: none">No heroes found.</div>

    /* =====================
       FILTER TAG DEFINITIONS
    ===================== */
    const TAGS = [
        "all", "melee", "tank", "spirit", "gun",
        "mobile", "support", "assassin", "control",
        "carry", "ranged", "healer", "duelist", "split"
    ];

    const TLABELS = {
        all:      "All",
        melee:    "Melee",
        tank:     "Tank",
        spirit:   "Spirit",
        gun:      "Gun",
        mobile:   "Mobile",
        support:  "Support",
        assassin: "Assassin",
        control:  "Control",
        carry:    "Carry",
        ranged:   "Ranged",
        healer:   "Healer",
        duelist:  "Duelist",
        split:    "Split push"
    };

    /* =====================
       STATE
    ===================== */
    let activeTag = "all";
    let expanded  = new Set(); // Multiple cards can be open at once

    /* =====================
       INIT FILTER BUTTONS
    ===================== */
    function initFilters() {
        const container = document.getElementById("filters");

        TAGS.forEach(tag => {
            const btn       = document.createElement("button");
            btn.className   = "fbtn" + (tag === activeTag ? " active" : "");
            btn.textContent = TLABELS[tag];
            btn.onclick     = () => { activeTag = tag; render(); };
            container.appendChild(btn);
        });
    }

    /* =====================
       BUILD ITEM PILL HTML
       Includes hover tooltip
    ===================== */
    function pillHtml(itemName) {
        const data = ITEMS[itemName];

        if (!data) {
            return `<span class="pill vit">${itemName}</span>`;
        }

        const categoryLabel = data.cat === "gun" ? "Gun"
                            : data.cat === "vit" ? "Vitality"
                            : "Spirit";

        return `<span class="pill ${data.cat}">${itemName}<div class="tip"><div class="tip-name">${itemName}</div><div class="tip-body">${data.desc}</div><span class="tip-cat ${data.cat}">${categoryLabel}</span></div></span>`;
    }

    /* =====================
       RENDER HERO CARDS
    ===================== */
    function render() {
        const query    = document.getElementById("srch").value.toLowerCase();
        const grid     = document.getElementById("grid");
        const noResult = document.getElementById("nor");

        // Update active filter button highlight
        document.querySelectorAll(".fbtn").forEach((btn, i) => {
            btn.classList.toggle("active", TAGS[i] === activeTag);
        });

        // Filter heroes by search query and active tag
        const filtered = H.filter(hero => {
            const matchesSearch = !query || hero.n.toLowerCase().includes(query);
            const matchesTag    = activeTag === "all" || hero.t.includes(activeTag);
            return matchesSearch && matchesTag;
        });

        grid.innerHTML = "";

        if (!filtered.length) {
            noResult.style.display = "block";
            return;
        }

        noResult.style.display = "none";

        // Build and append each hero card
        filtered.forEach(hero => {
            const portrait = P[hero.n]
                ? `<img src="${P[hero.n]}" alt="${hero.n}" loading="lazy"/>`
                : "";

            const card     = document.createElement("div");
            card.className = "card" + (expanded.has(hero.n) ? " open" : "");

            card.dataset.name = hero.n;
            card.onclick      = () => tog(hero.n);

            card.innerHTML = `
                <div class="ch">
                    <div class="avatar">${portrait}</div>
                    <div>
                        <div class="hname">${hero.n}</div>
                        <div class="hrole">${hero.r}</div>
                    </div>
                    <span class="chev">&#8964;</span>
                </div>
                <div class="cbody">
                    <div class="slabel">Counter items</div>
                    <div class="pills">${hero.i.map(pillHtml).join("")}</div>
                    <div class="slabel">Counter tips</div>
                    <ul class="tips-list">
                        ${hero.tips.map(tip => `<li>${tip}</li>`).join("")}
                    </ul>
                </div>`;

            grid.appendChild(card);
        });
    }

    /* =====================
       TOGGLE CARD OPEN / CLOSED
       Uses a Set so multiple cards can be open simultaneously.
       Directly toggles the class without re-rendering the grid.
    ===================== */
    function tog(name) {
        const card = document.querySelector(`.card[data-name="${CSS.escape(name)}"]`);

        if (expanded.has(name)) {
            expanded.delete(name);
            if (card) card.classList.remove("open");
        } else {
            expanded.add(name);
            if (card) card.classList.add("open");
        }
    }

    /* =====================
       INIT
    ===================== */
    initFilters();
    render();
